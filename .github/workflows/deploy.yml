name: Deploy to GitHub Pages

# Build from the site/ subfolder and publish to Pages. dist/ is never committed —
# CI builds it (spec §8). The hosting URL is env-driven (astro.config.mjs):
# defaults to the project site derived from the GitHub context; override by
# setting repo Variables PUBLIC_SITE / PUBLIC_BASE (and PUBLIC_CNAME for a custom
# domain). Set the Prompt API origin-trial token as the secret PUBLIC_OT_TOKEN.

on:
  push:
    branches: [main, site-rework]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Test gate — a red suite blocks the deploy.
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npx astro check
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      # Default to the GitHub project site; override via repo Variables.
      PUBLIC_SITE: ${{ vars.PUBLIC_SITE || format('https://{0}.github.io', github.repository_owner) }}
      PUBLIC_BASE: ${{ vars.PUBLIC_BASE || format('/{0}', github.event.repository.name) }}
      PUBLIC_OT_TOKEN: ${{ secrets.PUBLIC_OT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Write CNAME for a custom domain (only if PUBLIC_CNAME is set)
        if: ${{ vars.PUBLIC_CNAME != '' }}
        run: echo "${{ vars.PUBLIC_CNAME }}" > site/public/CNAME
      - uses: withastro/action@v3
        with:
          path: ./site
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
